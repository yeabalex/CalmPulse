name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/calmpulse

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Pull image and restart on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:latest
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          CONTAINER_NAME: calmpulse
          HOST_PORT: "3000"
          ENV_FILE: /opt/calmpulse/.env
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB: ${{ secrets.MONGODB_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          SESSION_COOKIE_SECURE: ${{ secrets.SESSION_COOKIE_SECURE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          envs: IMAGE,GHCR_USERNAME,GHCR_TOKEN,CONTAINER_NAME,HOST_PORT,ENV_FILE,MONGODB_URI,MONGODB_DB,JWT_SECRET,GROQ_API_KEY,NEXT_PUBLIC_APP_URL,SESSION_COOKIE_SECURE
          script: |
            set -euo pipefail

            # Dynamically create the environment file using secrets passed from GitHub Actions
            sudo mkdir -p "$(dirname "${ENV_FILE}")"
            cat <<EOF | sudo tee "${ENV_FILE}" > /dev/null
            MONGODB_URI=${MONGODB_URI}
            MONGODB_DB=${MONGODB_DB}
            JWT_SECRET=${JWT_SECRET}
            GROQ_API_KEY=${GROQ_API_KEY}
            NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
            SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE}
            EOF
            sudo chmod 600 "${ENV_FILE}"

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            docker pull "${IMAGE}"

            docker stop "${CONTAINER_NAME}" 2>/dev/null || true
            docker rm "${CONTAINER_NAME}" 2>/dev/null || true

            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              -p "${HOST_PORT}:3000" \
              --env-file "${ENV_FILE}" \
              "${IMAGE}"

            docker image prune -f
            docker ps --filter "name=${CONTAINER_NAME}"
