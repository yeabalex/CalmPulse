services:
  app:
    build:
      context: .
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/calmpulse
      JWT_SECRET: ${JWT_SECRET:-calmpulse-local-docker-jwt-secret-change-me}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo-data:
